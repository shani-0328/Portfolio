<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Extract the path from the URL
    var path = window.location.pathname.replace('/Portfolio/', '/');
    // If it ends with .txt, it's likely an RSC request
    if (path.endsWith('.txt')) {
      console.log('RSC request detected, providing empty response');
      document.write('');
    } else {
      // Otherwise, redirect to the main page
      window.location.href = '/Portfolio/';
    }
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
